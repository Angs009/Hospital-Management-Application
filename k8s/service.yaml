apiVersion: v1
kind: Service
metadata:
  name: hospital-web
  labels:
    app.kubernetes.io/name: hospital-application
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: hospital-application
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: hospital-application
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: hospital-mongodb
  labels:
    app.kubernetes.io/name: hospital-application
    app.kubernetes.io/component: mongodb
    app.kubernetes.io/part-of: hospital-application
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: hospital-application
    app.kubernetes.io/component: mongodb
  ports:
    - name: mongodb
      port: 27017
      targetPort: mongodb
      protocol: TCP

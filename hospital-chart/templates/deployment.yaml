apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hospital-app.fullname" . }}-web
  labels:
    {{- include "hospital-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "hospital-app.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "hospital-app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: hospital-application
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Values.container.name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: {{ .Values.container.portName }}
              containerPort: {{ .Values.container.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "hospital-app.fullname" . }}-config
            - secretRef:
                name: {{ include "hospital-app.secretName" . }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.container.portName }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: {{ .Values.container.portName }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if .Values.tmpVolume.enabled }}
          volumeMounts:
            - name: tmp
              mountPath: {{ .Values.tmpVolume.mountPath }}
          {{- end }}
      {{- if .Values.tmpVolume.enabled }}
      volumes:
        - name: tmp
          emptyDir: {}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- if .Values.mongodb.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hospital-app.mongodbName" . }}
  labels:
    {{- include "hospital-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
spec:
  replicas: {{ .Values.mongodb.replicaCount }}
  revisionHistoryLimit: {{ .Values.mongodb.revisionHistoryLimit }}
  strategy:
    type: {{ .Values.mongodb.strategyType }}
  selector:
    matchLabels:
      {{- include "hospital-app.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mongodb
  template:
    metadata:
      labels:
        {{- include "hospital-app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mongodb
        app.kubernetes.io/part-of: hospital-application
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.mongodb.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Values.mongodb.name }}
          image: "{{ .Values.mongodb.image.repository }}:{{ .Values.mongodb.image.tag }}"
          imagePullPolicy: {{ .Values.mongodb.image.pullPolicy }}
          ports:
            - name: {{ .Values.mongodb.service.portName }}
              containerPort: {{ .Values.mongodb.service.port }}
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: {{ .Values.mongodb.service.portName }}
            initialDelaySeconds: {{ .Values.mongodb.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.mongodb.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.mongodb.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.mongodb.probes.readiness.failureThreshold }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.mongodb.service.portName }}
            initialDelaySeconds: {{ .Values.mongodb.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.mongodb.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.mongodb.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.mongodb.probes.liveness.failureThreshold }}
          resources:
            {{- toYaml .Values.mongodb.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.mongodb.securityContext | nindent 12 }}
          {{- if .Values.mongodb.persistence.enabled }}
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
          {{- end }}
      {{- if .Values.mongodb.persistence.enabled }}
      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: {{ include "hospital-app.mongodbClaimName" . }}
      {{- end }}
{{- end }}
